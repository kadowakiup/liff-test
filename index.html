<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シフト管理</title>

    <!-- Noto sans -->
    <!-- Robot -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css?v=24">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="index.js?v=20"></script>
  </head>
  <body>
    <!-- <h2 class="title">シフト管理</h2> -->

    <div id="calendarView">

      <div id="summary" class="container" style="display:none;">
        <div><span id="userName"></span></div>
        <div><span id="workTime"></span></div>
      </div>

      <div id="result"></div>
      
      <div id="monthNav" class="container" style="display:none;">
        <button id="prevMonth"><img src="image/left_arrow.png" alt="前月"></button>
        <span id="currentMonth"></span>
        <button id="nextMonth"><img src="image/right_arrow.png" alt="翌月"></button>
      </div>
      
      <div id="calendar"></div>
    </div>

    <div id="detailView" class="container" style="display:none;">
      <button id="backButton"><img src="image/left_arrow.png" alt="もどる"></button>
      <h3 id="detailDate"></h3>
      <p id="detailShift"></p>

      <div class="detailView_menu">
        <button id="btnEdit">時間変更</button>
        <button id="btnDelete">休み / 削除</button>
        <button id="btnMedical">診断書提出</button>
      </div>

      <div id="medicalArea" style="display:none;">
        <p id="medicalGuide" style="margin-bottom:8px;">
          名前漢字フルネームと、日付が書いていますか？
        </p>
        <input type="file" id="medicalFile" accept="image/*" />
        <div id="medicalPreviewWrap" style="margin-top:12px; display:none;">
          <img id="medicalPreview" style="max-width:100%; border:1px solid #ccc; border-radius:8px;" />
        </div>
        <div id="medicalError" style="color:red; margin-top:8px;"></div>
        <button id="submitMedical" style="margin-top:12px;">提出する</button>
      </div>

      <div id="editArea" style="display:none;">
        <p>出勤</p>
        <select id="startTime"></select>

        <p>退勤</p>
        <select id="endTime"></select>

        <br><br>
        <button id="saveEdit">保存</button>

        <p id="editError" style="color:red;"></p>
      </div>
    </div>

  </body>
</html>
